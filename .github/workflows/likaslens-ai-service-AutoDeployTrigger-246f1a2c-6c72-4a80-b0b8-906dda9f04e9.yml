name: Trigger auto deployment for likaslens-ai-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/likaslens-ai-service-AutoDeployTrigger-246f1a2c-6c72-4a80-b0b8-906dda9f04e9.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LIKASLENSAISERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LIKASLENSAISERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LIKASLENSAISERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/apps/ai-service
          registryUrl: likaslensregistry.azurecr.io
          registryUsername: ${{ secrets.LIKASLENSAISERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.LIKASLENSAISERVICE_REGISTRY_PASSWORD }}
          containerAppName: likaslens-ai-service
          resourceGroup: likaslens
          imageToBuild: likaslensregistry.azurecr.io/likaslens-ai-service:${{ github.sha }}


