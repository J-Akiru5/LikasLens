name: Deploy AI Service to Azure Container App

on:
  push:
    branches: [main]
    paths:
      - 'apps/ai-service/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/apps/ai-service
          dockerfilePath: ${{ github.workspace }}/apps/ai-service/Dockerfile
          acrName: ${{ secrets.ACR_NAME }}
          acrUsername: ${{ secrets.ACR_USERNAME }}
          acrPassword: ${{ secrets.ACR_PASSWORD }}
          containerAppName: likaslens-ai-service
          resourceGroup: likaslens
          containerAppEnvironment: likaslens-env
          targetPort: 8001
